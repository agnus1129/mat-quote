function unitPrice(L){ return (CFG.matAllIn&&CFG.matAllIn[L])||0; }

function savedOf(count,L,cutW){if(cutW<=1||count<=0)return 0;const p=(L-cutW>=MINREUSE)?Math.floor(L/cutW):1;return count-Math.ceil(count/p);}
function calc(sp,L,s){
  const ax=axisCells(sp.w,sp.edges.left==='open',sp.edges.right==='open',L,s,ELASTIC);
  const ay=axisCells(sp.h,sp.edges.top==='open',sp.edges.bottom==='open',L,s,ELASTIC);
  const Mw=ax.cells,Mh=ay.cells,O=sp.edges;let c=0,si=0,k=0;
  for(let r=0;r<Mh;r++)for(let col=0;col<Mw;col++){const t=r===0,b=r===Mh-1,l=col===0,ri=col===Mw-1;
    const corner=(t&&l&&O.top==='open'&&O.left==='open')||(t&&ri&&O.top==='open'&&O.right==='open')||(b&&l&&O.bottom==='open'&&O.left==='open')||(b&&ri&&O.bottom==='open'&&O.right==='open');
    const open=(t&&O.top==='open')||(b&&O.bottom==='open')||(l&&O.left==='open')||(ri&&O.right==='open');
    if(corner)k++;else if(open)si++;else c++;}
  const cw=ax.overhang>1?L-ax.overhang:0,ch=ay.overhang>1?L-ay.overhang:0;
  const saved=savedOf(Mh,L,cw)+savedOf(Math.max(0,Mw-1),L,ch);
  return{c,si,k,saved,area:(sp.w*sp.h)/1e6};
}
function edgesFromOpen(o){ if(o>=2)return{top:'open',bottom:'wall',left:'wall',right:'open'}; if(o==1)return{top:'open',bottom:'wall',left:'wall',right:'wall'}; return{top:'wall',bottom:'wall',left:'wall',right:'wall'}; }
function scopeSpaces(){
  if(A.manualMode){ return A.manual.filter(m=>m.w>0&&m.h>0).map(m=>({name:m.name||'공간',w:+m.w,h:+m.h,edges:edgesFromOpen(+m.open)})); }
  const t=TPL[A.templateKey]; if(!t)return[];
  const zoneMap={living:['거실'],living_hall:['거실','복도'],living_hall_island:['거실','복도','주방'],living_hall_kitchen:['거실','복도','주방']};
  const roomMap={'방1':'안방','방2':'방2','방3':'방3'};
  let names=(zoneMap[A.zone]||[]).slice();
  (A.rooms||[]).forEach(r=>{ if(roomMap[r]) names.push(roomMap[r]); });
  const pick=[]; names.forEach(n=>{ const sp=t.spaces.find(x=>x.name===n); if(sp&&pick.indexOf(sp)<0)pick.push(sp); });
  const liv=t.spaces.find(x=>x.name==='거실'); const lscale=(A.livingW>0&&liv&&liv.w>0)?(A.livingW/liv.w):1;
  return pick.map(s=>{const ov=(A.dim&&A.dim[s.name])||{};const bw=s.w*lscale;const bh=(A.extend?s.h:Math.max(s.h-(s.shrinkH||0),s.w))*lscale;return {name:s.name,edges:s.edges,w:(ov.w>0?+ov.w:Math.round(bw)),h:(ov.h>0?+ov.h:Math.round(bh))};});
}
function estimate(){
  const comp=MATS[A.company]||MATS[0];
  let C=0,S=0,K=0,saved=0,area=0;
  scopeSpaces().forEach(sp=>{const r=calc(sp,comp.L,comp.s);C+=r.c;S+=r.si;K+=r.k;saved+=r.saved;area+=r.area;});
  const doorSides=Math.max(0,(A.doors||0)-(A.doorsFlush||0)); S+=doorSides;
  const net=Math.max(0,(C+S+K)-saved);
  const orderC=Math.ceil(C*1.05), orderS=S+3, orderK=K, orderTotal=orderC+orderS+orderK;
  const laid=C+S+K;                                   // 그리드 산출(격자)
  const unitArea=(comp.L*comp.L)/1e6;
  const areaCount=Math.ceil(area/unitArea);           // 면적 산출(시공면적÷매트면적)
  const gridCount=laid;
  const midCount0=Math.max(1,Math.round((areaCount+gridCount)/2)); // 중간값
  const midCount=(comp.L===1200)?midCount0:Math.ceil(midCount0*1.035); // 시공오차 여유 3~4% 가산(1200 제외)
  const unit=(CFG.matAllIn&&CFG.matAllIn[comp.L])||0; // 자재+시공 포함 장당단가
  const matLabor=midCount*unit;                       // 가격은 중간값 기준
  const thr=(CFG.visitThresh&&CFG.visitThresh[comp.L]!=null)?CFG.visitThresh[comp.L]:0;
  const visit=(thr>0 && midCount<thr)?(CFG.visitFee||0):0; // 임계 미만이면 출장비
  const cutCount=Math.max(0,(A.cuts||0));
  const cutCost=cutCount*(CFG.cutFee||0);             // 재단비(별도·예외)
  const total=matLabor+visit+cutCost;
  const vatMode=(CFG.vatMode)||'included';
  let supply,vat,grand;
  if(vatMode==='excluded'){ supply=total; vat=Math.round(total*0.1); grand=supply+vat; }
  else { grand=total; supply=Math.round(total/1.1); vat=grand-supply; }
  return{comp,C,S,K,doorSides,saved,net,orderC,orderS,orderK,orderTotal,laid,areaCount,gridCount,midCount,unit,thr,area,matLabor,visit,cutCount,cutCost,total,vatMode,supply,vat,grand};
}

function toggleRoom(r){const i=A.rooms.indexOf(r); if(i>=0)A.rooms.splice(i,1); else A.rooms.push(r); render();}
function startManual(){A.manualMode=true;A.danji=null;A.templateKey=null;go(4);}
function mAdd(){A.manual.push({name:'',w:3000,h:3000,open:1});render();}
function mU(i,f,v){A.manual[i][f]=(f==='name')?v:(+v);}
function mDel(i){A.manual.splice(i,1);render();}
function dimU(name,f,v){ if(!A.dim[name])A.dim[name]={}; A.dim[name][f]=Math.max(0,+v||0); }
function bump(key,d){A[key]=Math.max(0,(A[key]||0)+d);
  if(A.doorsFlush>A.doors)A.doorsFlush=A.doors;
  const m={doors:'vd',doorsFlush:'vf',cuts:'vp'}; const el=$(m[key]); if(el)el.textContent=A[key];
  if(key==='doors'){const f=$('vf');if(f)f.textContent=A.doorsFlush;}}
let dT=null;
function dSearch(v){clearTimeout(dT);const box=$('dres');if(!v||v.trim().length<1){box.innerHTML='';return;}
  dT=setTimeout(()=>dRun(v),300);}
async function dRun(v){const box=$('dres');if(!box||!v||!v.trim())return;box.innerHTML='<p class="hint">검색 중…</p>';try{const r=await fetch(PROXY+'/api/danji/search?keyword='+encodeURIComponent(v.trim()));const d=await r.json();
    if(d.error){box.innerHTML='<p class="hint" style="color:#b91c1c;white-space:pre-wrap">⚠ 서버 응답: '+d.error+'</p>';return;}
    if(!d.items||!d.items.length){box.innerHTML='<p class="hint">검색 결과 없음 — 건너뛰고 직접 선택해도 돼요!</p>';return;}
    const items=(d.items||[]).slice().sort((a,b)=>(((a.sido||'')+(a.sigungu||'')+a.kaptName)).localeCompare(((b.sido||'')+(b.sigungu||'')+b.kaptName),'ko'));
    const total=d.count||items.length;
    box.innerHTML='<div class="hint" style="margin:2px 0 6px">"'+v.trim()+'" 검색결과 '+total+'개'+(total>items.length?' · 상위 '+items.length+'개 표시 (이름을 더 입력하면 좁혀져요)':'')+'</div>'
      +'<div style="max-height:55vh;overflow-y:auto">'+items.map(it=>'<button class="opt" onclick="pickDanji(\''+it.kaptCode+'\',\''+it.kaptName.replace(/\x27/g,"")+'\')">'+it.kaptName+'<small>'+(it.sido||'')+' '+(it.sigungu||'')+'</small></button>').join('')+'</div>';
  }catch(e){box.innerHTML='<p class="hint" style="color:#b91c1c">⚠ 연결 실패: '+(e&&e.message?e.message:e)+'</p>';}}
function dKey(e,v){if(e.key!=='Enter')return;e.preventDefault();const box=$('dres');const first=box&&box.querySelector('button.opt');if(first){first.click();return;}clearTimeout(dT);dRun(v);}
async function pickDanji(code,name){A.danji={kaptCode:code,kaptName:name};A.dim={};A.livingW=0;
  try{const r=await fetch(PROXY+'/api/danji/detail?kaptCode='+code);const d=await r.json();const u=d.areaUnits||{};
    const cls=[['60이하',u['60이하']||0],['60~85',u['60~85']||0],['85~135',u['85~135']||0],['135초과',u['135초과']||0]].sort((a,b)=>b[1]-a[1]);
    const map={'60이하':'59_3베이','60~85':'84_4베이','85~135':'99_4베이','135초과':'134_4베이'};
    A.templateKey=(cls[0][1]>0?map[cls[0][0]]:null)||'84_4베이';}catch(e){A.templateKey=A.templateKey||'84_4베이';}
  try{const tr=await fetch(PROXY+'/api/danji/template?kaptCode='+code+'&key='+encodeURIComponent(A.templateKey));const td=await tr.json();if(td){if(td.dim)A.dim=td.dim;if(td.livingW)A.livingW=td.livingW;}}catch(e){}
  go(2);}
function loadPlanImg(inp){const f=inp.files&&inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{A.planImg=e.target.result;render();};r.readAsDataURL(f);}

  if(navigator.share){try{await navigator.share({title:'우리집 매트 견적',text:txt});return;}catch(e){}}

  if(!A.agreeReq){alert('개인정보 수집·이용 동의(필수)에 체크해 주세요.');go(7);return;}
  const e=estimate();
  const payload={cust:A.cust,agreeReq:A.agreeReq,agreeMkt:A.agreeMkt,danji:A.danji,
    company:e.comp.name,L:e.comp.L,area:+e.area.toFixed(2),orderTotal:e.orderTotal,total:e.total,summary:quoteText(),sessionId:SID,events:A.events};
  try{ await fetch(PROXY+'/api/lead',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); }
  catch(err){ try{localStorage.setItem('lead_'+Date.now(),JSON.stringify(payload));}catch(e){} }
  go(9);

function tip(label,key){ return '<span class="term" data-k="'+key+'" onclick="showTip(event)">'+label+'</span>'; }
function showTip(ev){ ev.stopPropagation(); const el=ev.currentTarget; const t=TERMS[el.getAttribute('data-k')]; if(!t)return;
  const box=$('tipbox'); box.className=''; box.innerHTML='<b>'+t.t+'</b>'+t.d; box.style.display='block';
  const r=el.getBoundingClientRect(); const bw=box.offsetWidth, bh=box.offsetHeight;
  let left=r.left+r.width/2-bw/2; left=Math.max(8,Math.min(left,window.innerWidth-bw-8));
  let top=r.top-bh-10; if(top<8){ top=r.bottom+10; box.classList.add('up'); }
  box.style.left=left+'px'; box.style.top=top+'px';
  const ax=r.left+r.width/2-left-7; box.style.setProperty('--ax',Math.max(8,Math.min(ax,bw-16))+'px'); }
function hideTip(){ const b=$('tipbox'); if(b)b.style.display='none'; }
document.addEventListener('click',function(e){ if(!(e.target.closest&&e.target.closest('.term'))&&e.target.id!=='tipbox') hideTip(); },true);

   +'<p class="hint" style="margin:0 0 8px">이름·전화번호·주소를 남기고 <b>개인정보 동의</b>에 체크하면 이 견적서를 문자로 보내드려요.</p>'
   +'<div class="lab">이름</div><input value="'+esc(c.name||'')+'" oninput="A.cust.name=this.value" placeholder="홍길동" style="margin-bottom:8px">'
   +'<div class="lab">휴대폰 번호</div><input value="'+esc(c.phone||'')+'" oninput="A.cust.phone=this.value;phoneHint(this)" placeholder="010-1234-5678" inputmode="numeric" style="margin-bottom:2px">'
   +'<div class="hint" id="phchk" style="margin-bottom:8px;color:'+(c.phone?(pv?'var(--ok)':'#b91c1c'):'')+'">'+(c.phone?(pv?'✓ 올바른 휴대폰 번호예요':'⚠ 휴대폰 번호를 정확히 (010으로 시작, 총 10~11자리)'):'숫자만 입력해도 돼요')+'</div>'
   +addrField(c)
   +'<button class="btn" style="background:'+(A.agreeReq?'#2563eb':'#cbd5e1')+'" '+(A.agreeReq?'':'disabled')+' onclick="sendQuoteSMS()">📨 이 번호로 견적서 발송</button>'
   +'<div class="hint" style="margin-top:6px'+(A.agreeReq?'':';color:#b91c1c')+'">'+(A.agreeReq?'위 개인정보 동의 후 발송돼요.':'※ 위 [필수] 개인정보 수집·이용 동의 후 발송돼요.')+'</div></div>'; }
async function sendQuoteSMS(){ if(!A.agreeReq){ alert('개인정보 수집·이용 동의(필수)에 체크해 주세요.'); return; }
  const c=A.cust||{};
  if(!c.name||!c.name.trim()){ alert('이름을 입력해 주세요 🙂'); return; }
  if(!validPhone(c.phone)){ alert('휴대폰 번호를 정확히 입력해 주세요. (010으로 시작, 총 10~11자리)'); return; }
  if(!c.addrVerified||!c.addrBase){ alert('주소 검색으로 실제 주소를 선택해 주세요 🏠'); return; }
  const e=estimate();
  const lead={cust:{name:c.name,phone:c.phone,addr:c.addr,time:c.time||'-',memo:c.memo||''},agreeReq:A.agreeReq,agreeMkt:A.agreeMkt,danji:A.danji,company:e.comp.name,L:e.comp.L,area:+e.area.toFixed(2),orderTotal:e.orderTotal,total:e.grand,summary:quoteText(),sessionId:SID,source:'quote_send'};
  try{ await fetch(PROXY+'/api/lead',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(lead)}); }catch(_){}
  try{ const r=await fetch(PROXY+'/api/quote/send',{method:'POST',headers:{'Content-Type':'application/json'},
       body:JSON.stringify({name:c.name,phone:c.phone,addr:c.addr,summary:quoteText(),company:e.comp.name,total:e.grand,agreeReq:A.agreeReq,agreeMkt:A.agreeMkt,zonecode:c.zonecode,addrVerified:true})});
    const d=await r.json();
    if(d.delivered){ alert('✅ '+c.name+'님 번호로 견적서를 발송했어요!'); }
    else if(d.error){ alert('⚠ '+d.error); }
    else{ alert('✅ '+(d.note||'접수되었습니다. 곧 문자로 보내드릴게요.')); }
  }catch(err){ alert('서버 연결을 확인해 주세요.'); } }

/* ===== 고객 후기 (#1) ===== */
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function stars(n){ n=Math.max(0,Math.min(5,n|0)); return '<span style="color:#f59e0b;letter-spacing:2px">'+'★'.repeat(n)+'<span style="color:#d1d5db">'+'★'.repeat(5-n)+'</span></span>'; }
function reviewTeaser(){ return '<div class="card2"><div class="sec" style="margin-top:0">⭐ 고객 후기</div><div id="revList"><div class="hint">후기 불러오는 중…</div></div><button class="btn ghost" style="margin-top:8px;width:100%;flex:none" onclick="go(11)">✏️ 후기 남기기</button></div>'; }
async function loadReviews(elId){ const el=$(elId); if(!el)return; const many=(elId==='revFull');
  try{ const r=await fetch(PROXY+'/api/reviews'); const d=await r.json(); const list=(d.reviews||[]).slice(0,many?50:3);
    if(!list.length){ el.innerHTML='<div class="hint">아직 후기가 없어요. 첫 후기의 주인공이 되어보세요! 🌟</div>'; return; }
    el.innerHTML=list.map(function(rv){ return '<div class="rev">'+stars(rv.rating)+'<div style="margin-top:2px">'+esc(rv.text)+'</div><div class="meta">'+esc(rv.nick)+(rv.danji?' · '+esc(rv.danji):'')+' · '+rv.date+'</div></div>'; }).join('');
  }catch(e){ el.innerHTML='<div class="hint">후기를 불러오지 못했어요(서버 연결 확인).</div>'; } }
function setRating(v){ A.rev=A.rev||{}; A.rev.rating=v; const sp=document.querySelectorAll('#starsPick span'); sp.forEach(function(x){ x.className=(+x.getAttribute('data-v')<=v)?'on':''; }); }
function setRev(f,v){ A.rev=A.rev||{}; A.rev[f]=v; }
async function submitReview(){ const rv=A.rev||{};
  if(!rv.rating){ alert('별점을 선택해 주세요 🌟'); return; }
  if(!rv.text||rv.text.trim().length<2){ alert('후기 내용을 조금만 더 적어주세요 🙂'); return; }
  try{ const r=await fetch(PROXY+'/api/reviews',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({rating:rv.rating,text:rv.text,nick:rv.nick,danji:rv.danji})});
    const d=await r.json(); if(!r.ok){ alert(d.error||'등록 실패'); return; }
    alert('소중한 후기 감사해요! 💛'); A.rev={}; render(); loadReviews('revFull');
  }catch(e){ alert('서버 연결을 확인해 주세요.'); } }

render();

/* ---- FAB 드래그 이동 (#고객요청: 가려짐 방지) ---- */
(function(){
  const f=document.getElementById('fab'); if(!f) return;
  try{ const p=JSON.parse(localStorage.getItem('fab_pos')||'null');
    if(p&&p.x!=null){ f.style.left=Math.min(Math.max(4,p.x),window.innerWidth-80)+'px'; f.style.top=Math.min(Math.max(4,p.y),window.innerHeight-60)+'px'; f.style.right='auto'; f.style.bottom='auto'; f.style.animation='none'; } }catch(e){}
  let drag=false,moved=false,sx=0,sy=0,ox=0,oy=0;
  f.addEventListener('pointerdown',function(e){ drag=true; moved=false; sx=e.clientX; sy=e.clientY;
    const r=f.getBoundingClientRect(); ox=r.left; oy=r.top; try{f.setPointerCapture(e.pointerId);}catch(_){}} );
  f.addEventListener('pointermove',function(e){ if(!drag) return;
    const dx=e.clientX-sx, dy=e.clientY-sy;
    if(!moved && Math.abs(dx)+Math.abs(dy)>8){ moved=true; f.style.animation='none'; f.style.right='auto'; f.style.bottom='auto'; }
    if(!moved) return;
    const nx=Math.min(Math.max(4,ox+dx), window.innerWidth-f.offsetWidth-4);
    const ny=Math.min(Math.max(4,oy+dy), window.innerHeight-f.offsetHeight-4);
    f.style.left=nx+'px'; f.style.top=ny+'px'; });
  function endDrag(){ if(drag&&moved){ const r=f.getBoundingClientRect();
      try{ localStorage.setItem('fab_pos', JSON.stringify({x:r.left,y:r.top})); }catch(_){}}
    drag=false; }
  f.addEventListener('pointerup',endDrag); f.addEventListener('pointercancel',endDrag);
  f.addEventListener('click',function(e){ if(moved){ e.stopImmediatePropagation(); e.preventDefault(); moved=false; } },true);
})();
</script>
